body:
  text: 正文半夏秫米湯素問和胃泄衛通營治不寐不寐由於厥氣逆陽不交陰理須匯防己地黃湯金匱要略治獨語桂枝甘草二防防己防風比酒漬絞汁不用煎加重地黃蒸汁濾妄行獨語不肯休二汁沖和服即止生則散邪熟補虛涼血疏風有精義梔豉大黃湯枳實酒疸心中痛懊憹谷疸茵陳蒿湯前方去豆豉枳實加茵陳蒿主治女勞硝石礬石散為功葶藶大棗瀉肺湯肺癰不臥喘難當不喘但咳胸皮錯葦莖湯孫思邈千金要方桃仁薏苡仁瓜瓣良奔豚湯治奔豚氣四物湯柴胡湯合桂枝湯三方相合去桂枝去柴胡兼生地煎加生葛李根皮先便後血黃土湯術白朮附子芩黃芩甘草阿膠地黃脾虛陽陷因生濕肝血隨經注大腸先血後便為近血赤豆當歸散甚良白頭翁湯治熱下痢黃連黃柏秦皮比性寒味苦入下焦堅陰止痢稱良劑仲景麥門冬湯人參半夏粳米棗甘草臨火逆上氣咽喉哽從胃生津救燥呈侯氏黑散治中風參人參苓茯苓薑乾薑桂枝術白朮歸當歸芎川芎細辛牡蠣防風芩黃芩桔梗礬石菊花用獨崇冷食自能填空竅嘉言極贊此方工風引湯治熱癱癇二脂赤白石脂寒水石膏石膏滑石紫石英六般石藥共龍骨牡蠣薑乾薑桂枝大黃甘草使風火交熾臟腑燔諸藥難療此能治金匱要略中風篇大人風引少小驚癇瘛瘲日數十發醫所不能治者此湯主之然亦猛劑虛者宜審鱉甲煎丸草三味桃仁承氣湯小柴胡湯去棗甘草加丹皮芍藥朴厚朴紫葳膠阿膠瞿麥石葦烏扇蟅蟲蜂窩蜣螂鼠婦葶藶子瘧母吞之塊自無以上均傷寒金匱方種子育麟丸術白朮棉子地熟地杞子沙苑蒺藜線魚鰾補骨脂柏子仁仲杜仲桂肉桂膝牛膝楮實茯苓萆薢調遺精去膝牛膝覆盆子加五味子麥冬羊腎搗男子媾精而得孕功在陰陽神氣交古來種子方雖多妙合陰陽惟此高煉真丸術蒼朮柏黃柏瀉澤瀉參人參茯苓鹿茸鳳眼草淫羊藿蛇床子五味子金鈴子蓮鬚沉香茴香大腹皮山藥糊丸鹽酒吞膏粱無嗣宜丸服壯陽益陰安腎丸太平惠民和劑局方蓯蓉山藥真沙苑破故紙胡桃肉萆薢術白朮苓茯苓斛石斛烏川烏桂心巴戟纘聚精丸沙苑蒺藜黃魚鰾少陽男人無子招少陽男人不得子宜用坎氣草四條熟地人參人乳汁杞子酒釀白蜜調豬肚丸著劉松石牡蠣白朮苦參益豬為水畜肚屬土厚胃泄水功偏捷鹹寒清熱苦堅陰甘溫健脾而勝濕濕熱遺精用因靈瘦勞服此亦肥白明目四神丸杞子椒川椒茴香青鹽四般制杞子明目補陰精千金外臺常服餌復借椒川椒茴香以和陽青鹽之潤和陰氣晉三刪改為合宜復入貞女貞子苓茯苓歸當歸菊花地黃目有赤脈加沙苑蒺藜以備人之各去取地芝丸李東垣方治目難近視生地天冬菊花枳殼定志丸孫思邈千金要方療遠視難參人參苓茯苓菖蒲遠志硃砂使不能遠視責無火目能近視知其有水不能遠視責其無火不能近視責無水目能遠視知其有火不能近視責其無水水宜補腎火補心識此二方便得旨磁朱丸孫思邈千金要方用磁朱曲神麯明目還能聰耳聾益本滋腎丸知母柏黃柏腎虛目暗宜斯藥黃柏滋腎加黃連水衰陽盛心煩爍單柏名為大補丸足心熱而腰痛劇或用四物湯或用四君子湯煎送隨人氣血弱黃柏為末薑酒調潛行散方痛風酌天真丹里沉香首琥珀蘆巴巴戟湊杜仲茴香補骨脂萆薢牽牛及肉桂或酒或鹽皆炒香陽虛腫脹功能奏陽虛腫脹證如何囊腫如升腿如斗臍腹痛冷按之堅陽去濕至脹之咎通陽逐濕脹自柔名曰天真形不朽小腸氣痛喝起丸青娥丸內加三種茴香萆薢胡蘆巴減去生薑蒜不用海藏生地黃連湯四物湯芩黃芩連黃連梔子防風血去過多因躁擾撮空錯語血風嘗清燥救肺湯嘉言造補出經方所未到內經無傷燥之門古方無傷燥之治經霜桑葉枇杷葉參人參麥冬杏仁麻黃阿膠石膏草甘草胃為肺母燥傷金甘寒養胃清金燥內燥宜滋外燥清外傷秋燥斯方好麥門冬飲劉完素宣明論方治膈消知母人參花粉調茯苓生地味五味子甘草炙葛根竹葉共煎燒神效散許叔微普濟本事方用鯽魚膽浮石蛤粉蟬蛻邀鹹寒止渴兼消水立法更比前方超通腎湯方治解㑊解㑊之病腎之責菖蒲生地五加皮羚羊角芍藥草甘草豬苓澤瀉聖濟茯神湯治煎厥涼肝攝腎救陰精羚羊角龍骨沙參味五味子遠志葳蕤酸棗仁赤茯苓湯治薄厥陳皮生薑麥冬桔梗人參檳榔赤芍藥清肝平肝墜其逆千金茯神湯生地玉竹門冬花粉知母小麥大棗淡竹葉泄熱生津消渴宜竹葉黃耆湯是復方四物湯竹葉石膏湯加入黃芩去薑棗氣血兩燥消渴嘗血分燥熱地黃飲氣分燥熱白虎湯蘆根湯孫思邈千金要方治病後噦竹茹生薑粳米再病後餘熱留上焦甘寒益胃斯為貴久咳癰痿十味煎王燾外臺祕要桑白皮地骨皮地黃鮮竹瀝薑生薑麥冬葛根皆取汁攙合牛酥棗蜜黏臨臥取含津液咽或但胡桃薑蜜研吐血咳嗽百花煎生地汁阿膠柿乾柿杏仁研牛乳胡桃薑藕汁秦艽酒蜜棗相聯寶鑑人參蛤蚧散貝母知母桑白皮茯苓杏仁炙甘草水寒久嗽咯喘宜膈熱咽痛利膈湯牛蒡子甘草桔梗薄荷荊芥防風人參殭蠶各等分辛涼輕散上焦方喉風骨哽無憂散荊芥玄參川雅連貫仲豆根茯苓砂仁草甘草滑石寒水石月石共研腎熱湯載千金翼能治耳聾流膿血磁石牡蠣芍藥甘草鮮地黃麥冬術白朮草甘草加蔥白麥門冬湯粳米生麥冬同薑汁炒煎成火盡水溢高原位腫滿喘浮煩渴尋琥珀茯苓湯療便數五苓散六一散合煎斟葳蕤湯是清散劑活人為治風溫制白薇玉竹葛根羌活芎川芎麻黃甘草膏石膏馬兜鈴繼枇杷葉散太平惠民和劑局方陳皮朴厚朴丁香麥冬甘草白茅根香薷木瓜薑煎服伏暑煩渴嘔噦尊冷香飲子甘草多附子陳皮薑草果溫脾去渴通陰陽霍亂躁煩脈伏可調中散用四君子湯全歸當歸桂心乾薑五味子聯上咳下泄心動掣三焦不利病之詮白朮湯方治飧泄厚朴當歸龍骨綴煎加艾葉與生薑溫固升清以調血鱉甲湯方治伏梁地黃歸當歸柴胡芍藥桂枝乾薑三稜大腹皮均研末煎益生薑與木香聖濟龍骨建中湯歸當歸芍藥參人參耆黃耆甘草遠志瀉澤瀉冤熱腹痛出白液肝風傳腎名疝瘕柏子仁散治腹筋急辛潤通陽利氣方防風枳殼歸當歸芎川芎細辛白朮茯苓桂枝附子與檳榔脾疸口甜用蘭草內經論治極精詳膽疸惟有針刺法後賢因制益膽湯苦參參人參茯苓芩黃芩甘草桂枝苦補甘緩辛散方外臺茯苓飲參人參術白朮枳實生薑廣橘皮胸有停痰因吐水消痰行水必扶脾禹餘糧丸十八味蛇含石針砂為主宰莪術稜三稜歸當歸膝牛膝蔻白豆蔻芎川芎羌活白蒺藜青皮茯苓桂心附子茴香木香乾薑蒸餅丸水邪腫脹功效著此方治水不用逐水之品不蹈重虛之戒小溫中丸六君子湯去人參神麯苦參香附群黃連針砂醋糊丸陳皮生薑湯送餌濕熱腫滿皆屬脾土鬱奪之為正治虛者加參人參朴厚朴去連黃連不失溫中之名義四獸飲用六君子湯烏梅草果薑棗佐氣虛痰聚瘧不已和四臟以補脾土補肝湯治寒厥痛肉桂山萸柏子仁桃仁苓茯苓草甘草辛細辛防風兼大棗辛潤溫通厥痛消熱厥心痛金鈴散川楝子延胡索等分調又有雪羹湯荸薺虴海虴肝經熱厥腹痛邀安胃湯用人參先椒川椒梅烏梅枳實與薑連黃連辛酸化肝甘和胃肝化胃和痛嘔蠲更衣丸蘆薈砂仁麥冬廣腸堅結便難通結在腸頭非在腹滋柔下奪並有功此丸大苦通陰氣陰氣通時堅結融人參散治午前熱異功散逍遙散再加葛乾葛午後發熱白朮湯四君子湯柴胡澤瀉知母骨地骨皮地生地烏骨雞丸用八珍湯鱉甲青蒿酸棗仁地骨皮丹皮杞枸杞子麥冬附子除蒸退熱善調經玉燭散乃重方義四物湯合調胃承氣湯經閉腹痛而善飢通瘀泄熱斯無弊體肥不孕啓宮丸二陳湯曲神麯術白朮附香附芎川芎攢瘦胎飲用枳殼芩黃芩術白朮理氣消痰一例看婦人良方鉤藤湯瘛瘲胎動服之康桑葉參人參歸當歸桔梗茯神或益芩黃芩梔子術白朮亦朗天仙藤散治子氣香附陳皮甘草烏藥承蘇葉木瓜薑作引天仙藤即木香藤子腫全生白朮丸五皮飲桑白皮陳橘皮生薑皮大腹皮茯苓皮加燈芯煎內去桑皮一方無桑白皮有五加皮亦有不去桑皮者鯉魚湯方亦相宜千金鯉魚湯治妊娠遍身浮腫胎間有水氣白朮茯苓當歸芍藥各三錢橘皮一錢生薑五片活鯉魚一頭先煮鯉魚至熟澄清取汁內藥煎子煩竹葉湯參人參茯苓麥冬知母與黃芩子嗽紫菀湯天冬杏仁甘草桔梗竹茹桑白皮安營散參人參麥冬甘草歸當歸辛細辛燈草滑石通草治子淋地黃煎孫思邈千金要方用荊瀝竹瀝酥薑地骨皮地黃汁天冬參人參茯苓大黃梔子子風煩熱功堪立安胎飲用建蓮子台州青苧白糯米小産由傷肝腎脾服此永無墮胎慮千金神造湯真妙阿膠蟹爪生甘草東流水煮葦薪炊死胎可下生可保補脬飲用生黃絹白丹皮根白芨片服此藥時勿作聲脬傷淋瀝真良驗丹溪朱氏參朮膏參人參術白朮苓茯苓草甘草陳皮耆黃耆桃仁産難胞損成淋瀝煎用豬羊胞補胞回生丹用米醋熬蘇木黑豆大黃膏後入八珍湯兼失笑散山稜牛膝延胡桃蒼術羌活青皮橘紅木香附香附烏藥良薑乳沒邀萸肉木瓜地榆炭秋葵子益母草馬鞭苗蜜搗陰乾熔蠟護産難血暈奇功饒龍腦雞蘇丸清血熱木通柴胡地生地先熬汁更入連黃連膠阿膠與麥冬參人參耆黃耆甘草蒲黃末煉蜜為丸細嚼吞崩淋咳衄皆相合血崩熱淋咳血衄血消渴口臭氣分血分有熱宜常服之震靈丹餘糧禹餘糧赤石脂石英紫石英代赭石朱砂沒藥乳香陰不斂陽陽不歸脫血之陰氣無附下虛上盛喘厥危瀉痢崩中血暈死鎮厥固脫入下焦丸時此藥宜堅細白薇湯方出本事當歸甘草人參使婦人平居忽如死病名鬱冒急煎餌椿皮丸用白芍奎黃柏良薑各炒灰苦以堅陰澀收脫瘦人帶下熱多推桃仁湯治𧈟槐角子艾葉大棗四般是蟲蝕腸胃能殺人此方治𧈟出巢氏定癌散用兩頭尖土楝子峰房各煅研瘍毒根深在臟腑乳癌非此不能痊抱龍丸方共有四驚風隨證相參治辰砂抱龍丸驚入心金箔麝香雄黃膽星竺天竺黃是祕傳拘龍丸治風痰防風桔梗天麻鉤藤橘紅使薄荷枳殼芍白芍陳皮膽星貝母茯神蜜丸餌牛黃抱龍丸肝受驚熄風化痰鎮驚比蠍全蠍蠶殭蠶琥珀赤茯苓加入辰砂抱龍丸里又有人參抱龍丸飛金朱砂柏子仁膽南星天竺黃檀香藥芍藥草甘草苓茯苓因虛發搐宜投此沉香天麻丸寶鑑烏川烏附黑附甘草歸當歸羌活獨活防風半夏殭蠶益智子慢驚發搐力能匡雄黃檳榔丸白礬治蟲痛時作時止時輕重使君子丸檳榔星天南星蟲積勞黃腹蠱腫喜食糖茶米土等隨其所喜和丸送玉樞丹能萬病解卻邪解毒是其長五倍子與千金子大戟山慈菰麝香一名紫金錠又名萬病解毒丸此祕藥中之第一方也所治之證與本草不甚相合確有良驗真不可思議或加硃砂雄黃各五錢尤效寒阻靈竅蘇合香丸木香丁香沉香薰陸香麝香冰片腦安息香犀角硃砂香附術白朮原方尚有蓽茇砂仁檀香小活絡丹川烏草烏膽星地龍乳香沒藥符經絡夾痰並死血酒丸吞下自能除續骨丹加白附子天麻木鱉子膝牛膝羌活朱砂大活絡丹五十味四君子湯四物湯為首務羌活防風辛細辛葛根桂官桂麻黃麻天麻安息香木香丁香沉香藿香附黑附附香附蔻白蔻青皮烏藥血竭研黃連大黃骨碎補烏白花蛇蠶殭蠶蠍全蠍鼠矢牛黃冰片腦麝香犀角龜板虎脛骨貫仲玄參何首烏小活絡丹內仍寓除川烏芎川芎加黃芩靈仙松脂足其數此方祛痰風熱毒瘀入於經絡非此不能達神虛養真丹治癱瘓四物湯天麻羌活纘除麻天麻加防風名補肝丸便難眩暈風虛按桃仁紅花四物湯臟血便祕瘀血將更加竹瀝與薑汁左偏不遂服之良牽正散治口眼歪白附子殭蠶全蠍偕外用萆麻鱔血裱改容膏亦治歪斜醫方集解改容膏方下云萆麻子一兩冰片三分共搗為膏寒月加乾薑附子各一錢或用鱔魚血或用蜣螂搗敷亦良蓋三物皆追風拔毒之品也史國公藥酒治風痹歸當歸術白朮羌活防風艽秦艽牛膝萆薢仲杜仲杞子虎脛骨鱉甲蠶砂蒼耳子松節茄根浸飲之嚴氏蠲痹湯治三氣乘虛阻襲而為痹羌活防風薑片子薑黃去三氣邪歸當歸耆黃耆芍藥草甘草調營衛腳氣雞鳴散周氏木瓜薑生薑橘皮吳茱萸檳榔桔梗紫蘇葉五更冷服腳氣除舒筋飲用片薑黃歸當歸芍白芍桐皮甘草術白朮羌活沉香少許薑三片氣血凝留臂痛匡死血作淋牛膝膏酒浸牛膝當歸梢桃仁生地赤芍藥麝香琥珀研末調
